name: Check Tests and Sphinx Build on Pull Requests

# Runs on pull requests targeting the main branch
on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v6

      # uv をセットアップ
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      # 必要な依存関係をインストール
      - name: Install dependencies
        run: uv sync --all-groups

      # Pre-commit フックを実行
      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      # テストを実行
      - name: Run pytest
        run: uv run pytest

      # Sphinx ドキュメントをビルド
      - name: Build Sphinx
        run: |
          cd docs
          uv run make dirhtml
