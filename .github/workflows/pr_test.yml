name: Check Tests and Sphinx Build on Pull Requests

# Runs on pull requests targeting the main branch
on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v6

      # Poetry をインストール
      - name: Install Poetry
        run: pipx install poetry

      # Python をセットアップ
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "poetry"

      # 必要な依存関係をインストール
      - name: Install dependencies
        run: poetry install

      # Pre-commit フックを実行
      - name: Run pre-commit hooks
        run: poetry run pre-commit run --all-files

      # テストを実行
      - name: Run pytest
        run: poetry run pytest

      # Sphinx ドキュメントをビルド
      - name: Build Sphinx
        run: |
          cd docs
          poetry run make dirhtml
