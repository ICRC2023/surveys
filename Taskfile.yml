# https://taskfile.dev

version: '3'

vars:
  GREETING: "🔬 Titanite - Survey Analysis Tool"
  PYTHON_VERSION: "3.11"

tasks:
  default:
    desc: "Show project information"
    cmds:
      - echo "{{.GREETING}}"
      - echo ""
      - echo "📋 Available tasks:"
      - task --list
    silent: true

  # ============================================================================
  # Development Environment - Setup and teardown
  # ============================================================================

  code:
    desc: "Start VS Code"
    cmds:
      - poetry run code .

  env:setup:
    desc: "Set up development environment"
    cmds:
      - echo "Setting up development environment..."
      - task: deps:setup
      - task: pre-commit:setup
      - echo "✓ Development environment ready"
    silent: true

  env:clean:
    desc: "Clean development environment"
    cmds:
      - rm -rf .venv __pycache__ .pytest_cache .ruff_cache
      - echo "✓ Environment cleaned"
    silent: true

  # ============================================================================
  # Dependency management tasks - Update and check dependencies
  # ============================================================================

  deps:setup:
    desc: Setup Python environment
    cmds:
      - poetry install

  deps:check:
    desc: Check for outdated packages
    cmds:
      - poetry show --outdated

  deps:update:
    desc: Update dependencies
    cmds:
      - poetry update

  # ============================================================================
  # Git management tasks - Manage Git
  # ============================================================================

  status:
    desc: Show git status.
    cmds:
      - git status

  log:
    desc: Show recent commits (last 10).
    cmds:
      - git log --oneline -10

  push:
    desc: Push commits to remote (main branch).
    cmds:
      - git push origin main

  push:tags:
    desc: Push commits and tags to remote.
    cmds:
      - git push origin main --tags

  # Release procedure:
  #   0. task bump:check
  #   1. task bump:patch / bump:minor / bump:major  (ask user before running)
  #   2. task docs:release -- X.Y.Z  (create and fill in release notes)
  #   3. Update mkdocs.yml navigation
  #   4. Commit mkdocs.yml and the release note
  #   5. task push:tags
  #   6. task push:release -- X.Y.Z
  push:release:
    desc: Create a GitLab release with release notes (Usage - task push:release -- X.Y.Z)
    requires:
      vars: [CLI_ARGS]
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Version required. Usage: task push:release -- X.Y.Z"
      - sh: "test -f docs/releases/v{{.CLI_ARGS}}.md"
        msg: "Release notes not found: docs/releases/v{{.CLI_ARGS}}.md"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - glab release create {{.VERSION}} --name "v{{.VERSION}}" --notes-file docs/releases/v{{.VERSION}}.md

  # ============================================================================
  # Pre-commit hooks
  # ============================================================================

  pre-commit:setup:
    desc: Install pre-commit hooks
    cmds:
      - poetry run pre-commit install
      - echo "✓ Pre-commit hooks installed"
    silent: true

  pre-commit:
    desc: Run pre-commit hooks on all files
    cmds:
      - poetry run pre-commit run --all-files

  pre-commit:update:
    desc: Update pre-commit hooks to latest versions
    cmds:
      - poetry run pre-commit autoupdate
      - echo "✓ Pre-commit hooks updated"
    silent: true

  pre-commit:uninstall:
    desc: Uninstall pre-commit hooks
    cmds:
      - poetry run pre-commit uninstall
      - echo "✓ Pre-commit hooks uninstalled"
    silent: true

  # ============================================================================
  # Documentation - Sphinx-based docs
  # ============================================================================
  docs:serve:
    desc: "Serve documentation locally with autobuild (http://localhost:8000)"
    cmds:
      - cd docs && poetry run sphinx-autobuild . _build/html

  docs:build:
    desc: "Build documentation"
    cmds:
      - cd docs && poetry run sphinx-build -b html . _build/html

  # ============================================================================
  # Testing and Code Quality
  # ============================================================================

  test:
    desc: "Run tests"
    cmds:
      - poetry run pytest

  test:verbose:
    desc: "Run tests with verbose output"
    cmds:
      - poetry run pytest -v

  test:coverage:
    desc: "Run tests with coverage report"
    cmds:
      - poetry run pytest --cov=titanite

  format:
    desc: "Format code with ruff"
    cmds:
      - poetry run ruff format .

  lint:
    desc: "Lint code with ruff"
    cmds:
      - poetry run ruff check .

  # ============================================================================
  # Version Management & Release
  # ============================================================================
  version:
    desc: Show current version
    cmds:
      - git tag -l | sort -V | tail -n 1
    silent: true

  bump:check:
    desc: Preview next version bump
    cmds:
      - poetry run cz bump --check-consistency --changelog --dry-run

  bump:auto:
    desc: Bump version (auto-detect from commits)
    cmds:
      - poetry run cz bump --check-consistency --changelog

  bump:patch:
    desc: Bump patch version (--increment patch)
    cmds:
      - poetry run cz bump --check-consistency --changelog --increment patch

  bump:minor:
    desc: Bump minor version (--increment minor)
    cmds:
      - poetry run cz bump --check-consistency --changelog --increment minor

  bump:major:
    desc: Bump major version (--increment major)
    cmds:
      - poetry run cz bump --check-consistency --changelog --increment major

  # ============================================================================
  # Project Information & CLI
  # ============================================================================
  info:
    desc: "Show project information"
    cmds:
      - echo "Current version:"
      - task version
    silent: true

  cli:help:
    desc: "Show CLI help"
    cmds:
      - poetry run ti --help

  # ============================================================================
  # Notebooks
  # ============================================================================
  nb:sync:
    desc: "Sync Notebooks (ipynb -> md)"
    cmds:
      - poetry run jupytext --sync notebooks/nb/*.ipynb
      - git status
