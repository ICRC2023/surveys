# https://taskfile.dev

version: "3"

vars:
  GREETING: "🔬 Titanite - Survey Analysis Tool"
  PYTHON_VERSION: "3.11"

tasks:
  default:
    desc: List available tasks
    cmds:
      - echo "{{.GREETING}}"
      - echo ""
      - echo "📋 Available tasks:"
      - task --list
    silent: true

  # ============================================================================
  # Development Environment - Setup and teardown
  # ============================================================================

  code:
    desc: Start VS Code
    cmds:
      - uv run code .

  env:setup:
    desc: Set up development environment
    cmds:
      - task: deps:setup
      - task: pre-commit:setup

  env:clean:
    desc: Remove .venv and caches
    cmds:
      - rm -rf .venv __pycache__ .pytest_cache .ruff_cache

  # ============================================================================
  # Dependency management tasks - Update and check dependencies
  # ============================================================================

  deps:setup:
    desc: Install dependencies
    cmds:
      - uv sync --all-groups

  deps:outdated:
    desc: List outdated dependencies
    cmds:
      - uv pip list --outdated

  deps:update:
    desc: Update dependencies
    cmds:
      - uv sync --upgrade --all-groups

  deps:audit:
    desc: Check for security vulnerabilities in dependencies
    cmds:
      - uv audit --preview-features audit-command

  # ============================================================================
  # Git management tasks - Manage Git
  # ============================================================================

  status:
    desc: Show git status.
    cmds:
      - git status --short --branch
    silent: true

  log:
    desc: Show commit history (last 20 commits)
    cmds:
      - git log --oneline --graph --decorate -n 20

  log:last-tag:
    desc: Show commits since the last tag
    vars:
      LAST_TAG:
        sh: git describe --tags --abbrev=0
    preconditions:
      - sh: "git describe --tags --abbrev=0 >/dev/null 2>&1"
        msg: "No tags found"
    cmds:
      - git log {{.LAST_TAG}}..HEAD --oneline --graph --decorate

  diff:
    desc: Show unstaged changes
    cmds:
      - git diff
    silent: true

  diff:staged:
    desc: Show staged changes
    cmds:
      - git diff -cached
    silent: true

  diff:last-tag:
    desc: Show all changes since the last tag
    vars:
      LAST_TAG:
        sh: git desctibe --tags --abbrev=0
    preconditions:
      - sh: "git describe --tags --abbrev=0 >/dev/null 2>&1"
        msg: "No tags found"
    cmds:
      - git diff {{.LAST_TAG}}..HEAD
    silent: true

  push:
    desc: Push commits to remote
    cmds:
      - git push origin HEAD

  push:tags:
    desc: Push commits and tags to remote.
    cmds:
      - git push origin HEAD --tags

  # Release procedure:
  #   0. task bump:check
  #   1. task bump:patch / bump:minor / bump:major  (ask user before running)
  #   2. task push:tags
  #   3. task docs:release -- X.Y.Z  (create and fill in release notes)
  #     - Fill in the release note in English
  #     - Update zensical docs navigation
  #     - Commit the changes
  #   4. task push:release -- X.Y.Z (Upload the new release note to remote
  push:release:
    desc: "Create a GitHub release with release notes (Usage: task push:release -- X.Y.Z)"
    requires:
      vars: [CLI_ARGS]
    vars:
      VERSION: "{{.CLI_ARGS}}"
      SOURCE: "docs/releases/v{{.CLI_ARGS}}.md"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Version required. Usage: task push:release -- X.Y.Z"
      - sh: "test -f {{.SOURCE}}"
        msg: "Release notes not found: {{.SOURCE}}"
    cmds:
      - gh release create {{.VERSION}} --title "{{.VERSION}}" --notes-file {{.SOURCE}}

  # ============================================================================
  # Pre-commit hooks
  # ============================================================================

  pre-commit:
    desc: Run pre-commit hooks on all files
    cmds:
      - uv run pre-commit run --all-files

  pre-commit:setup:
    desc: Install pre-commit hooks
    cmds:
      - uv run pre-commit install

  pre-commit:update:
    desc: Update pre-commit hooks to latest versions
    cmds:
      - uv run pre-commit autoupdate

  pre-commit:uninstall:
    desc: Uninstall pre-commit hooks
    cmds:
      - uv run pre-commit uninstall

  # ============================================================================
  # Documentation - Sphinx-based docs
  # ============================================================================
  docs:serve:
    desc: "Serve documentation locally with autobuild (http://localhost:8000)"
    dir: docs
    cmds:
      - uv run sphinx-autobuild . _build/html

  docs:build:
    desc: "Build documentation"
    dir: docs
    cmds:
      - uv run sphinx-build -b html . _build/html

  docs:release:
    desc: "Scaffold a new release note from template (Usage: task docs:release -- X.Y.Z)"
    requires:
      vars: [CLI_ARGS]
    vars:
      VERSION: "{{.CLI_ARGS"
      SOURCE: "templates/release.md"
      TARGET: "docs/releases/v{{.CLI_ARGS}}.md"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Version required. Usage: task docs:release -- X.Y.Z"
      - sh: "[ ! -f {{.TARGET}} ]"
        msg: "Release notes already exist: {{.TARGET}}"
    cmds:
      - cp {{.SOURCE}} {{.TARGET}}
      - echo "Created {{.TARGET}}. Please edit the file to add release notes."

  # ============================================================================
  # Testing and Code Quality
  # ============================================================================

  test:
    desc: "Run tests"
    cmds:
      - uv run pytest

  test:verbose:
    desc: "Run tests with verbose output"
    cmds:
      - uv run pytest -v

  test:coverage:
    desc: "Run tests with coverage report"
    cmds:
      - uv run pytest --cov=titanite

  format:
    desc: "Format code with ruff"
    cmds:
      - uv run ruff format .

  lint:
    desc: "Lint code with ruff"
    cmds:
      - uv run ruff check .

  # ============================================================================
  # Version Management & Release
  # ============================================================================
  version:
    desc: Show current version
    cmds:
      - git tag -l | sort -V | tail -n 1
    silent: true

  bump:check:
    desc: Preview next version bump
    cmds:
      - uv run cz bump --check-consistency --changelog --dry-run

  bump:auto:
    desc: Bump version (auto-detect from commits)
    cmds:
      - uv run cz bump --check-consistency --changelog

  bump:patch:
    desc: Bump patch version (--increment patch)
    cmds:
      - uv run cz bump --check-consistency --changelog --increment patch

  bump:minor:
    desc: Bump minor version (--increment minor)
    cmds:
      - uv run cz bump --check-consistency --changelog --increment minor

  bump:major:
    desc: Bump major version (--increment major)
    cmds:
      - uv run cz bump --check-consistency --changelog --increment major

  # ============================================================================
  # Project Information & CLI
  # ============================================================================
  info:
    desc: "Show project information"
    cmds:
      - echo "Current version:"
      - task version
    silent: true

  cli:help:
    desc: "Show CLI help"
    cmds:
      - uv run ti --help

  # ============================================================================
  # Notebooks
  # ============================================================================
  nb:sync:
    desc: "Sync Notebooks (ipynb -> md)"
    cmds:
      - uv run jupytext --sync notebooks/nb/*.ipynb
      - git status

  nb:edit:
    desc: "Start Marimo editor for analysis notebooks (Usage: task nb:edit -- notebooks/analysis/q02_gender.py)"
    cmds:
      - uv run marimo edit {{.CLI_ARGS}}

  nb:run:
    desc: "Run Marimo notebook as an app (Usage: task nb:run -- notebooks/analysis/q02_gender.py)"
    cmds:
      - uv run marimo run {{.CLI_ARGS}}

  nb:export:
    desc: "Export Marimo notebooks in analysis/ to static HTML under docs/survey/pre-survey/analysis/"
    cmds:
      - mkdir -p docs/survey/pre-survey/analysis
      - |
        for f in notebooks/analysis/*.py; do
          name=$(basename "$f" .py)
          uv run marimo export html --no-include-code "$f" -o "docs/survey/pre-survey/analysis/${name}.html"
        done
      - echo "✓ Exported notebooks to docs/survey/pre-survey/analysis/"
